<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TradeMaster — royal_hippo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;background:#111;color:#ddd;padding:24px}
h1{font-size:1.3em;color:#eee;margin-bottom:6px}
.sub{color:#666;font-size:.85em;margin-bottom:24px}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:32px}
.stat{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:4px;padding:14px 16px}
.stat-label{color:#777;font-size:.75em;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.stat-value{font-size:1.4em;font-weight:700;color:#eee}
.stat-value.pos{color:#4caf50}
.stat-value.neg{color:#f44336}
.stat-value.neu{color:#aaa}
h2{font-size:1em;color:#888;margin-bottom:10px;border-bottom:1px solid #222;padding-bottom:6px}
.table-wrap{overflow-x:auto;margin-bottom:40px}
table{width:100%;border-collapse:collapse;font-size:.85em}
th{background:#1a1a1a;color:#666;padding:8px 10px;text-align:left;border-bottom:1px solid #2a2a2a;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid #1a1a1a;white-space:nowrap}
tr:hover td{background:#161616}
.pos{color:#4caf50}
.neg{color:#f44336}
.neu{color:#888}
.tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:.8em}
.tag-sl{background:#3a1a1a;color:#f44336}
.tag-st{background:#1a2a3a;color:#64b5f6}
.tag-sq{background:#1a2a1a;color:#81c784}
.tag-eod{background:#2a2a1a;color:#ffb74d}
.updated{margin-top:32px;color:#444;font-size:.78em}
.open-badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:.75em;background:#1a2a1a;color:#81c784;border:1px solid #2a4a2a;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
#pw-gate{position:fixed;inset:0;background:#0d0d0d;display:flex;align-items:center;justify-content:center;z-index:9999}
#pw-gate.hidden{display:none}
.pw-box{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:40px 36px;width:320px;text-align:center}
.pw-box h2{color:#eee;font-size:1em;margin-bottom:6px;letter-spacing:.05em}
.pw-box p{color:#555;font-size:.78em;margin-bottom:24px}
.pw-box input{width:100%;background:#111;border:1px solid #333;border-radius:4px;padding:10px 12px;color:#ddd;font-family:monospace;font-size:.9em;outline:none;margin-bottom:12px}
.pw-box input:focus{border-color:#555}
.pw-box button{width:100%;background:#1e3a1e;border:1px solid #2a5a2a;border-radius:4px;color:#81c784;padding:10px;font-family:monospace;cursor:pointer;font-size:.9em}
.pw-box button:hover{background:#254825}
.pw-err{color:#f44336;font-size:.8em;margin-top:8px;min-height:1.2em}
#tm-toolbar{display:none;margin-bottom:16px}
.dl-btn{background:#1a2a3a;border:1px solid #2a4a6a;border-radius:4px;color:#64b5f6;padding:7px 14px;font-family:monospace;font-size:.82em;cursor:pointer}
.dl-btn:hover{background:#22344a}
</style>
</head>
<body>
<div id="pw-gate"><div class="pw-box"><p>Restricted access. Enter passcode</p><input id="pw-input" type="password" placeholder="" autofocus><button id="pw-submit">Unlock</button><div class="pw-err" id="pw-err"></div></div></div>
<a href="../../index.html" style="display:inline-block;margin-bottom:18px;font-size:.8em;
   color:#888;text-decoration:none;border:1px solid #2a2a2a;padding:4px 12px;border-radius:3px;">
  &larr; All Strategies
</a>
<h1>TradeMaster &mdash; royal_hippo</h1>
<div id="tm-toolbar"><button id="tm-dl" class="dl-btn">&#11015; Download data (JSON)</button></div>
<div id="tm-content"></div>
<script>
(function(){
  var ENCRYPTED=true;  // true → fetch+decrypt; false → plaintext payload
  var ENCFILE="latest.enc";      // relative path to the encrypted payload file
  var DLNAME="royal_hippo_data.json";
  var g=document.getElementById('pw-gate');
  var c=document.getElementById('tm-content');
  var tb=document.getElementById('tm-toolbar');
  var rawData=null;
  function reveal(payload){
    c.innerHTML=payload.html;
    rawData=payload.data;
    if(g)g.classList.add('hidden');
    tb.style.display='';
  }
  function fail(msg){
    c.innerHTML='<p style="color:#f44336;padding:24px 0">'+msg+'</p>';
    if(g)g.classList.add('hidden');
  }
  function download(){
    if(rawData==null)return;
    var blob=new Blob([JSON.stringify(rawData,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download=DLNAME;document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
  }
  document.getElementById('tm-dl').addEventListener('click',download);

  // The encrypted payload is a SEPARATE file (kept out of this HTML so it can be
  // a clean, versioned artifact). Fetch it once; decrypt in-memory on unlock.
  var envP=fetch(ENCFILE,{cache:'no-store'}).then(function(r){
    if(!r.ok)throw new Error('fetch '+r.status);return r.json();
  });

  if(!ENCRYPTED){
    envP.then(function(env){reveal(env.plain);})
        .catch(function(){fail('Failed to load dashboard data.');});
    return;
  }

  function b2u(s){return Uint8Array.from(atob(s),function(ch){return ch.charCodeAt(0);});}
  async function decryptWith(pw){
    var env=await envP;
    var salt=b2u(env.salt),iv=b2u(env.iv),ct=b2u(env.ct);
    var bk=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt:salt,iterations:env.iter,hash:'SHA-256'},
      bk,{name:'AES-GCM',length:256},false,['decrypt']);
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct);
    return JSON.parse(new TextDecoder().decode(pt));
  }
  var skey='tm_pw_'+location.pathname;
  async function check(){
    var inp=document.getElementById('pw-input');
    try{
      var payload=await decryptWith(inp.value);
      sessionStorage.setItem(skey,inp.value);
      reveal(payload);
    }catch(e){
      document.getElementById('pw-err').textContent='Incorrect passcode';
      inp.value='';
    }
  }
  document.getElementById('pw-submit').addEventListener('click',check);
  document.getElementById('pw-input').addEventListener('keydown',function(e){if(e.key==='Enter')check();});
  var cached=sessionStorage.getItem(skey);
  if(cached){decryptWith(cached).then(reveal).catch(function(){sessionStorage.removeItem(skey);});}
})();
</script>
</body>
</html>
